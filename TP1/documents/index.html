<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insertion de Document | Portail</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stylesheet1.css">
</head>
<body>

<div class="shape shape-1"></div>
<div class="shape shape-2"></div>

<div class="container">
    <h2>Ajouter un document</h2>

    <form action="upload.php" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="document">Choisir le document</label>
            <input type="file" id="document" name="document" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" name="description" placeholder="Ex: Rapport annuel 2026" required>
        </div>

        <div class="form-group">
            <label for="keywords">Mots-clés</label>
            <input type="text" id="keywords" name="keywords" placeholder="Ex: rapport, pdf, 2026" required>
        </div>

        <button type="submit">Envoyer le Document</button>
    </form>

    <div class="link">
        <a href="search.html">← Aller à la recherche</a>
    </div>
</div>

</body>
</html>
